<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | jsphthrn</title>
    <link href="./style.css" rel="stylesheet">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="logo">
                <img class="logo header" src="./assets/company-logo-generic.svg">
                <div class="logo-text header">jsphthrn</div>
            </div>
            <ul class="navigation">
                <a href="#"><li class="nav-button">Home</li></a>
                <a href="#"><li class="nav-button">Apps</li></a>
                <a href="#"><li class="nav-button">Blog</li></a>
                <a href="#"><li class="nav-button">Gallery</li></a>
                <a href="#"><li class="nav-button">About</li></a>
            </ul>
        </div>

        
        <div class="sidebar"> 
            <div class="actions">
                <div class="action-button" id="new-game">New game</div>
                <div class="action-button" id="show-score">Show overall score</div>
                <div class="action-button" id="restore-game">Restore game</div>
            </div>
            <div class="player-list" id="player-list">

            </div>
        </div>


        <div class="app-content">
            <div class="app-header">
                <div class="app-name">Tic Tac Toe</div>
            </div>
            <div id="tic-tac-toe"></div>
        </div>

        <dialog class="panel" id="game-starting">
            <div class="panel-title">New game</div>
            <form id="player-1-input">
                <label for="player-1-name">Player 1: </label>
                <input type="text" name="player-1-name" id="player-1-name" required>
                <label for="marker-1">Marker: </label>
                <input type="text" name="marker-1" id="marker-1" required>
            </form>
            <form id="player-2-input">
                <label for="player-2-name">Player 2: </label>
                <input type="text" name="player-2-name" id="player-2-name" required>
                <label for="marker-2">Marker: </label>
                <input type="text" name="marker-2" id="marker-2" required>
            </form>

            <div class="panel-bottom">
                <button class="panel-button" id="start-game">Start</button>
                <button class="panel-button" id="cancel-start">Cancel</button>
            </div>

        </dialog>
        
        <div class="footer">
            <div class="head-logo">
                <img src="./assets/company-logo-generic.svg" class="company-logo">
            </div>
            <div class="social">
                <img src="./assets/facebook.svg" class="social-icon">
                <img src="./assets/github.svg" class="social-icon">
                <img src="./assets/linkedin.svg" class="social-icon">
            </div>
            <div class="copyright">jsphthrn 2026. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
